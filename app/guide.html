<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide de prise en main — ClickProspect</title>
<meta name="description" content="Le guide complet de ClickProspect : 11 étapes clés, de la première connexion jusqu'à la fidélisation client.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600,0,700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0; --terracotta: #C1653D; --terracotta-deep: #A2502E;
    --sauge: #7A9471; --text: #35302A; --text-soft: #6E6459;
    --white: #FFFFFF; --border: rgba(53,48,42,0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--cream); color: var(--text);
    font-family: 'Figtree', sans-serif; line-height: 1.6;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 32px 24px 64px; }
  .logo { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; margin-bottom: 8px; text-decoration: none; color: var(--text); }
  .logo-mark { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--terracotta), var(--sauge)); }
  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .back { font-size: 14px; color: var(--text-soft); text-decoration: none; }
  .back:hover { color: var(--terracotta-deep); }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 32px; margin: 0 0 8px; text-align: center; }
  .subtitle { text-align: center; color: var(--text-soft); font-size: 15px; margin: 0 0 36px; }

  .guide-carousel { position: relative; }
  .guide-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 20px;
    overflow: hidden;
    background: var(--white);
    box-shadow: 0 8px 30px rgba(53,48,42,0.14);
  }
  .guide-slide {
    position: absolute; inset: 0;
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, visibility 0s linear 0.4s;
  }
  .guide-slide.is-active {
    opacity: 1; visibility: visible;
    transition: opacity 0.4s ease;
  }
  .guide-slide img { width: 100%; height: 100%; object-fit: contain; display: block; background: var(--white); }

  .guide-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 18px; margin-top: 20px;
  }
  .guide-arrow {
    background: var(--white); border: 1.5px solid var(--border);
    color: var(--text); width: 40px; height: 40px; border-radius: 50%;
    font-size: 19px; line-height: 1; cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .guide-arrow:hover { background: var(--terracotta); border-color: var(--terracotta); color: var(--white); }
  .guide-arrow:disabled { opacity: 0.35; cursor: default; }
  .guide-arrow:disabled:hover { background: var(--white); border-color: var(--border); color: var(--text); }
  .guide-counter { font-size: 14px; color: var(--text-soft); min-width: 64px; text-align: center; font-variant-numeric: tabular-nums; }

  .guide-dots { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-top: 18px; }
  .guide-dot {
    width: 8px; height: 8px; border-radius: 50%; border: none;
    background: rgba(53,48,42,0.18); padding: 0; cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .guide-dot.is-active { background: var(--terracotta); transform: scale(1.3); }

  .guide-cta { text-align: center; margin-top: 44px; }
  .btn-primary {
    display: inline-block; background: var(--terracotta); color: var(--white);
    font-weight: 700; font-size: 15px; padding: 14px 30px; border-radius: 30px;
    text-decoration: none;
  }
  .btn-primary:hover { background: var(--terracotta-deep); }

  @media (prefers-reduced-motion: reduce) {
    .guide-slide { transition: opacity 0.01s linear, visibility 0s linear; }
    .guide-slide.is-active { transition: opacity 0.01s linear; }
  }
  @media (max-width: 640px) {
    h1 { font-size: 24px; }
    .guide-arrow { width: 36px; height: 36px; font-size: 17px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <a href="/" class="logo"><span class="logo-mark"></span>ClickProspect</a>
    <a href="/" class="back">← Retour à l'accueil</a>
  </div>

  <h1>Le guide complet de votre outil de prospection</h1>
  <p class="subtitle">11 étapes clés, de la première connexion jusqu'à la fidélisation client.</p>

  <div class="guide-carousel" id="guide-carousel" role="region" aria-roledescription="carrousel" aria-label="Guide de prise en main ClickProspect">
    <div class="guide-frame">
      <div class="guide-track">
        {% for n in range(1, 17) %}
        <div class="guide-slide{% if n == 1 %} is-active{% endif %}">
          <img src="/static/guide/slide-{{ '%02d' % n }}.jpg" alt="Guide ClickProspect — écran {{ n }} sur 16" loading="{{ 'eager' if n == 1 else 'lazy' }}">
        </div>
        {% endfor %}
      </div>
    </div>

    <div class="guide-controls">
      <button type="button" class="guide-arrow" id="guide-prev" aria-label="Écran précédent">‹</button>
      <span class="guide-counter" id="guide-counter">1 / 16</span>
      <button type="button" class="guide-arrow" id="guide-next" aria-label="Écran suivant">›</button>
    </div>

    <div class="guide-dots" id="guide-dots" role="tablist" aria-label="Choisir un écran">
      {% for n in range(1, 17) %}
      <button type="button" class="guide-dot{% if n == 1 %} is-active{% endif %}" role="tab" aria-selected="{{ 'true' if n == 1 else 'false' }}" aria-label="Écran {{ n }}"></button>
      {% endfor %}
    </div>
  </div>

  <div class="guide-cta">
    <a href="/signup" class="btn-primary">Essayer gratuitement</a>
  </div>
</div>

<script>
(function () {
  var carousel = document.getElementById('guide-carousel');
  if (!carousel) return;
  var slides = carousel.querySelectorAll('.guide-slide');
  var dots = document.getElementById('guide-dots').querySelectorAll('.guide-dot');
  var counter = document.getElementById('guide-counter');
  var prevBtn = document.getElementById('guide-prev');
  var nextBtn = document.getElementById('guide-next');
  var index = 0;

  function show(i) {
    index = Math.max(0, Math.min(slides.length - 1, i));
    slides.forEach(function (el, n) { el.classList.toggle('is-active', n === index); });
    dots.forEach(function (el, n) {
      el.classList.toggle('is-active', n === index);
      el.setAttribute('aria-selected', n === index ? 'true' : 'false');
    });
    counter.textContent = (index + 1) + ' / ' + slides.length;
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === slides.length - 1;
  }

  function next() { show(index + 1); }
  function prev() { show(index - 1); }

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);
  dots.forEach(function (dot, n) {
    dot.addEventListener('click', function () { show(n); });
  });

  carousel.setAttribute('tabindex', '0');
  carousel.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft') { prev(); }
    if (e.key === 'ArrowRight') { next(); }
  });

  // Balayage tactile (mobile)
  var touchStartX = null;
  carousel.addEventListener('touchstart', function (e) { touchStartX = e.touches[0].clientX; }, { passive: true });
  carousel.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
    touchStartX = null;
  }, { passive: true });

  show(0);
})();
</script>
</body>
</html>
