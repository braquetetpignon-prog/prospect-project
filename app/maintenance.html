<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance en cours — ClickProspect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600,0,700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0; --terracotta: #C1653D; --terracotta-deep: #A2502E;
    --sauge: #7A9471; --text: #35302A; --text-soft: #6E6459;
    --white: #FFFFFF; --border: rgba(53,48,42,0.12);
    --shadow: 0 16px 40px rgba(53,40,24,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--text);
    font-family: 'Figtree', sans-serif; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 44px; width: 100%; max-width: 440px; text-align: center; }
  .logo { display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; margin-bottom: 24px; color: var(--text); }
  .logo-mark { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--terracotta), var(--sauge)); }
  .icon { font-size: 40px; margin-bottom: 8px; }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; margin: 0 0 10px; }
  p { color: var(--text-soft); font-size: 15px; line-height: 1.6; margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-mark"></span>ClickProspect</div>
  <div class="icon">🔧</div>
  <h1>Maintenance en cours</h1>
  <p>Nous effectuons une mise à jour de courte durée.<br>Le site sera de retour dans quelques minutes — merci de votre patience.</p>
</div>
</body>
</html>
