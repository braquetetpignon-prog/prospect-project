<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — ClickProspect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600,0,700&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0; --terracotta: #C1653D; --terracotta-deep: #A2502E;
    --sauge: #7A9471; --text: #35302A; --text-soft: #6E6459;
    --white: #FFFFFF; --border: rgba(53,48,42,0.12);
    --shadow: 0 16px 40px rgba(53,40,24,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--cream); color: var(--text);
    font-family: 'Figtree', sans-serif; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 44px; width: 100%; max-width: 420px; }
  .logo { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; margin-bottom: 20px; text-decoration: none; color: var(--text); }
  .logo-mark { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--terracotta), var(--sauge)); }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px; margin: 0 0 8px; }
  .sub { color: var(--text-soft); font-size: 13.5px; margin: 0 0 24px; line-height: 1.5; }
  label { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 6px; margin-top: 16px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border);
    font-family: 'Figtree', sans-serif; font-size: 15px; background: var(--cream); color: var(--text);
  }
  input:focus { outline: none; border-color: var(--terracotta); }
  .hint { font-size: 12px; color: var(--text-soft); margin-top: 5px; }
  .btn { width: 100%; margin-top: 26px; padding: 13px; border-radius: 999px; border: none; background: var(--terracotta); color: var(--white); font-weight: 600; font-size: 15px; cursor: pointer; font-family: 'Figtree', sans-serif; }
  .btn:hover { background: var(--terracotta-deep); }
  .btn:disabled { opacity: 0.6; cursor: default; }
  .error { background: #F8E6E0; color: #A2502E; border-radius: 10px; padding: 11px 14px; font-size: 13.5px; margin-top: 18px; display: none; }
  .success { background: #EAF0E4; color: #4F6647; border-radius: 10px; padding: 11px 14px; font-size: 13.5px; margin-top: 18px; display: none; }
  .footer-link { text-align: center; margin-top: 22px; font-size: 14px; color: var(--text-soft); }
  .footer-link a { color: var(--terracotta); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo"><span class="logo-mark"></span>ClickProspect</a>
  <h1>Mot de passe oublié</h1>
  <p class="sub">
    Réinitialise ton mot de passe avec ton code PIN (défini depuis Mon compte).
    Si tu n'as jamais défini de code PIN, demande à un administrateur de ton espace
    de réinitialiser ton mot de passe.
  </p>

  <form id="forgot-form">
    <label for="email">E-mail</label>
    <input id="email" type="email" required placeholder="vous@entreprise.fr">

    <label for="pin">Code PIN</label>
    <input id="pin" type="password" inputmode="numeric" required minlength="6" placeholder="6 chiffres minimum">

    <label for="new_password">Nouveau mot de passe</label>
    <input id="new_password" type="password" required minlength="8">
    <div class="hint">8 caractères minimum.</div>

    <label for="new_password_confirm">Confirmer le nouveau mot de passe</label>
    <input id="new_password_confirm" type="password" required minlength="8">

    <button class="btn" type="submit">Réinitialiser mon mot de passe</button>
    <div class="error" id="error-box"></div>
    <div class="success" id="success-box"></div>
  </form>

  <div class="footer-link"><a href="/login">Retour à la connexion</a></div>
</div>

<script>
const form = document.getElementById('forgot-form');
const errorBox = document.getElementById('error-box');
const successBox = document.getElementById('success-box');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  const newPassword = document.getElementById('new_password').value;
  const confirm = document.getElementById('new_password_confirm').value;
  if (newPassword !== confirm) {
    errorBox.textContent = 'Les deux mots de passe ne correspondent pas.';
    errorBox.style.display = 'block';
    return;
  }

  const btn = form.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Réinitialisation…';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        pin: document.getElementById('pin').value.trim(),
        new_password: newPassword,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Une erreur est survenue.');
    successBox.textContent = 'Mot de passe réinitialisé. Tu peux te connecter avec ton nouveau mot de passe.';
    successBox.style.display = 'block';
    form.reset();
    setTimeout(() => { window.location.href = '/login'; }, 2000);
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Réinitialiser mon mot de passe';
  }
});
</script>
</body>
</html>
