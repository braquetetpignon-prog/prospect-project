services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ENV=preproduction
      - DATABASE_URL=postgresql://clickprospect:changeme@db:5432/clickprospect
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=clickprospect
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=clickprospect
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
